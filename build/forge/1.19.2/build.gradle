buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net/' }
        maven { url = 'https://maven.aliyun.com/repository/public' }
        mavenCentral()
    }
    dependencies {
        classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '6.0.+', changing: true
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'maven-publish'

version = '0.1.0'
group = 'com.placeanywhere'
archivesBaseName = 'freeplacement'

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
}

sourceSets {
    main {
        java { srcDir '../../../../src/place-anywhere-free-placement/forge/1.19.2/java' }
        resources { srcDir '../../../../src/place-anywhere-free-placement/forge/1.19.2/resources' }
    }
}

minecraft {
    mappings channel: 'official', version: '1.19.2'
    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                freeplacement {
                    source sourceSets.main
                }
            }
        }
        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                freeplacement {
                    source sourceSets.main
                }
            }
        }
    }
}

repositories {
    maven { url = 'https://maven.aliyun.com/repository/public' }
    maven { url = 'https://maven.minecraftforge.net/' }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.19.2-43.3.0'
    implementation 'org.joml:joml:1.10.5'
    compileOnly files("../../../place-anywhere-core/forge/1.19.2/build/libs/placeanywhere-0.1.0.jar")
}

jar {
    manifest {
        attributes([
            "Specification-Title": "freeplacement",
            "Specification-Vendor": "placeanywhere",
            "Specification-Version": "1",
            "Implementation-Title": project.name,
            "Implementation-Version": "${archiveVersion}",
            "Implementation-Vendor": "placeanywhere",
            "MixinConfigs": "freeplacement.client.mixins.json"
        ])
    }
}
