buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net/' }
        maven { url = 'https://maven.aliyun.com/repository/public' }
        mavenCentral()
    }
    dependencies {
        classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '6.0.+', changing: true
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'maven-publish'

version = '0.1.0'
group = 'com.placeanywhere'
archivesBaseName = 'betterslab'

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

sourceSets {
    main {
        java { srcDir '../../../../src/better-slab/forge/1.19.4/java' }
        resources { srcDir '../../../../src/better-slab/forge/1.19.4/resources' }
    }
}

minecraft {
    mappings channel: 'official', version: '1.19.4'
    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                betterslab {
                    source sourceSets.main
                }
            }
        }
        server {
            workingDirectory project.file('run')
            property 'forge.logging.console.level', 'debug'
            mods {
                betterslab {
                    source sourceSets.main
                }
            }
        }
    }
}

repositories {
    maven { url = 'https://maven.aliyun.com/repository/public' }
    maven { url = 'https://maven.minecraftforge.net/' }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.19.4-45.2.0'
    compileOnly files("../../../place-anywhere-core/forge/1.19.4/build/libs/placeanywhere-0.1.0.jar")
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes([
            "Specification-Title": "betterslab",
            "Specification-Vendor": "placeanywhere",
            "Specification-Version": "1",
            "Implementation-Title": project.name,
            "Implementation-Version": "${archiveVersion}",
            "Implementation-Vendor": "placeanywhere",
            "MixinConfigs": "betterslab.mixins.json,betterslab.client.mixins.json"
        ])
    }
}
